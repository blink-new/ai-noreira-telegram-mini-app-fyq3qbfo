<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Noreira - Telegram Mini App</title>
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Unlock Protocol Configuration -->
    <script>
      // Set up Unlock Protocol configuration before loading the script
      window.unlockProtocolConfig = {
        network: 137, // Polygon mainnet
        locks: {
          '0x1234567890123456789012345678901234567890': {
            name: '10 Minute Session'
          },
          '0x0987654321098765432109876543210987654321': {
            name: 'Booking Fee'
          }
        },
        icon: 'https://unlock-protocol.com/static/images/svg/unlock-word-mark.svg',
        callToAction: {
          default: 'Purchase access to continue',
          expired: 'Your access has expired. Please purchase again.',
          pending: 'Please complete your purchase...',
          confirmed: 'Access granted! You can now proceed.',
        },
        theme: {
          primaryColor: '#333333',
          backgroundColor: '#FCF9F4',
          accentColor: '#F0DAD0',
        }
      };
      
      // Initialize unlock protocol when ready
      window.addEventListener('DOMContentLoaded', function() {
        if (typeof window.unlockProtocol !== 'undefined') {
          console.log('Unlock Protocol loaded successfully');
        }
      });
    </script>
    
    <!-- Unlock Protocol Script -->
    <script src="https://paywall.unlock-protocol.com/static/unlock.latest.min.js" defer></script>
